name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Install Soldeer deps
        run: forge soldeer install

      - name: Run Forge lint
        run: forge lint src

      - name: Run Forge build
        run: forge build

      - name: Run Forge tests
        run: forge test --no-match-test "Report|invariant" -vvv
