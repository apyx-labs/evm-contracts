[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]

fs_permissions = [
    { access = "read-write", path = "./config.toml" },
    { access = "read-write", path = "./out" },
    { access = "read-write", path = "./deploy" },
    { access = "read-write", path = "./reports" },
]

ignored_error_codes = [
    5667, # unused parameter
    5574, # contract size
    3860, # init code size
]
ignored_warnings_from = [
    "cmds/",
    # Dependencies
    "dependencies/forge-std-1.11.0/src/StdConfig.sol",
    "dependencies/@openzeppelin-contracts-5.5.0/utils/TransientSlot.sol",
]

[profile.release]
solc_version = "0.8.30"
optimizer = true

# Skip compiling test files
test = "skip"

[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
mainnet = "${ETHEREUM_RPC_URL}"

[lint]
exclude_lints = [
    "mixed-case-variable",
    "mixed-case-function",
    "pascal-case-struct",
]

[invariant]
fail_on_revert = true
runs = 256            # Number of test runs
depth = 1024          # Calls per run

[dependencies]
forge-std = "1.11.0"
"@openzeppelin-contracts-upgradeable" = "5.5.0"
"@openzeppelin-contracts" = "5.5.0"
solady = "0.1.26"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
