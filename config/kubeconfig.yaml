apiVersion: v1
kind: Config
preferences: {}

current-context: dev-admin

contexts:
- name: dev-admin
  context:
    cluster: dev
    user: dev-admin
- name: dev-fragmetric
  context:
    cluster: dev
    user: dev-fragmetric

clusters:
- cluster:
    certificate-authority-data: 
    server: https://0B00D161441D372E4ABEEB62A1BF3EFA.gr7.ap-southeast-1.eks.amazonaws.com
  name: dev
  
users:
- name: dev-admin
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      args:
      - --region
      - ap-southeast-1
      - eks
      - get-token
      - --cluster-name
      - dev
      - --output
      - json
      command: aws
      env:
      - name: AWS_PROFILE
        value: dev-admin

- name: dev-fragmetric
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      args:
      - --region
      - ap-southeast-1
      - eks
      - get-token
      - --cluster-name
      - dev
      - --output
      - json
      command: aws
      env:
      - name: AWS_PROFILE
        value: dev-fragmetric
